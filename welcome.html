<!DOCTYPE html>
<html>

<head>

<title>Smart Library Management</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

/* BODY */

body{

margin:0;

font-family:Poppins;

overflow:hidden;

}

/* HEADER */

.header{

position:absolute;

top:0;

width:100%;

padding:22px;

text-align:center;

font-size:24px;

font-weight:600;

color:white;

background:rgba(15,23,42,.65);

backdrop-filter:blur(6px);

z-index:10;

}

/* HERO IMAGE */

.hero{

height:100vh;

background:

linear-gradient(

rgba(0,0,0,.35),

rgba(0,0,0,.35)

),

url("https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=2000&q=80");

background-size:cover;

background-position:center;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

color:white;

}

/* CONTENT */

.content{

max-width:800px;

padding:20px;

}

/* TITLE */

h1{

font-family:'Playfair Display',serif;

font-size:60px;

font-weight:700;

letter-spacing:1px;

margin-bottom:15px;

text-shadow:0px 6px 15px rgba(0,0,0,.6);

}

/* DESCRIPTION */

p{

font-size:20px;

line-height:1.6;

text-shadow:

0px 4px 10px rgba(0,0,0,.6);

}

/* BUTTON */

.btn{

margin-top:35px;

display:inline-block;

background:#f59e0b;

padding:16px 42px;

border-radius:12px;

color:white;

text-decoration:none;

font-weight:600;

transition:.3s;

}

.btn:hover{

background:#606467;

transform:translateY(-3px);

box-shadow:0px 10px 25px rgba(0,0,0,.5);

}

</style>

</head>

<body>

<div class="header">

Smart Library Management System

</div>

<div class="hero">

<div class="content">

<h1>

Welcome to Smart Library

</h1>

<p>

Manage books, monitor borrowing activity and experience a modern digital library system designed for students and staff.

</p>

<a class="btn"

href="register.html">

Get Started

</a>

</div>

</div>

</body>

</html>
